<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt – MOCNO Dance Studio</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">MOCNO <span class="logo-strzalka">▶▶</span> DANCE STUDIO</a>
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul id="menu">
            <li><a href="index.html">Strona główna</a></li>
            <li><a href="o-nas.html">O nas</a></li>
            <li><a href="zajecia.html">Zajęcia</a></li>
            <li><a href="grafik.html">Grafik</a></li>
            <li><a href="zapisy.html">Zapisy</a></li>
            <li><a href="cennik.html">Cennik</a></li>
            <li><a href="galeria.html">Galeria</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <section class="podstrona-hero">
        <h2>Kontakt</h2>
    </section>
    <section class="podstrona-tresc">
        <div class="kontakt-info">
            <p>📍 ul. Jakaś 1, Białystok</p>
            <p>📞 123 456 789</p>
            <p>✉️ kontakt@studiotanca.pl</p>
        </div>
        <div class="mapa">
            <iframe
                src="https://maps.google.com/maps?q=53.1416251,23.0731497&hl=pl&z=16&output=embed"
                width="100%"
                height="400"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>
    </section>

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('aktywny');
            if (menu.style.display === 'flex') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'flex';
                menu.style.flexDirection = 'column';
            }
        });

        document.querySelectorAll('#menu a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('aktywny');
                menu.style.display = 'none';
            });
        });

        if (window.innerWidth <= 768) {
            menu.style.display = 'none';
        }
    </script>

</body>
</html>
