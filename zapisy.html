    </nav>

    <section class="podstrona-hero">
        <h2>Zapisy</h2>
    </section>
    <section class="podstrona-tresc">
        <div class="formularz-wrapper">
            <iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLSd5MSF0rJyLzunM7IJLws8fQ9Y4eDYpt0Ufbl4oF5nsP_CdVw/viewform?embedded=true"

            </iframe>
        </div>
    </section>

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('aktywny');
            menu.classList.toggle('otwarte');
        });
        document.querySelectorAll('#menu a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('aktywny');
                menu.classList.remove('otwarte');
            });
        });
    </script>

</body>
